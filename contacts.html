<style>
body {
  margin: 0;
  padding: 40px 50px 0 50px;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #000000, #001f3f, #0072ff);
  color: white;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center; /* horizontal center */
}

#dividing {
  height: 3px;
  width: 80%;
  margin: 40px auto;
  background: linear-gradient(to right, transparent, #4da6ff, #ffffff, #4da6ff, transparent);
  border-radius: 50px;
}

hr {
  border: none;
  height: 2px;
  background: red;
  opacity: 0.4;
}

a#header {
  color: #F80626;
  text-decoration: none;
  font-weight: bold;
  letter-spacing: 1px;
  transition: 0.3s ease;
  display: inline-block;
  margin: 10px 6px;
  padding: 8px 18px;
  border-radius: 6px;
}

a#header:hover {
  color: #fff;
  background: #0072ff;
  box-shadow: 0 6px 12px rgba(0,114,255,0.7);
  transform: scale(1.1);
  text-shadow: 0 0 6px rgba(255,255,255,0.8);
}

h1 {
  margin-top: 40px;
  font-size: 32px;
  font-family: Algerian, serif;
  text-decoration: underline;
  animation: fadeSlideDown 1s ease forwards;
}

form {
  background-color: #37A3AF;
  padding: 30px;
  width: 350px;
  border-radius: 15px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.6);
  border: 1px solid rgba(255,255,255,0.1);
  transition: transform 0.4s ease, box-shadow 0.4s ease, border 0.4s ease;
  animation: fadeSlideDown 1.2s ease forwards;
  margin: 20px 0; /* vertical spacing */
}

form:hover {
  transform: scale(1.05);
  box-shadow: 0 15px 35px rgba(0,0,0,0.6);
  border: 8px solid rgba(255,255,255,0.1);
  background-color: #337980;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border-radius: 8px;
  border: 1px solid #333;
  background: #1e1e1e;
  color: white;
  font-size: 14px;
  font-weight: 900;
}

input:hover, textarea:hover {
  background-color: #AAB0A7;
  color: black;
}

input:focus, textarea:focus {
  outline: none;
  border-color: #003366;
  box-shadow: 0 0 8px red;
}

textarea {
  height: 100px;
  resize: none;
}

button {
  background: linear-gradient(135deg, #872A91, #912A68, #912A34);
  color: white;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 5px 15px rgba(0,114,255,0.6);
  background: linear-gradient(135deg, #912A34, #912A68, #872A91);
}

@keyframes fadeSlideDown {
  0% {
    opacity: 0;
    transform: translateY(-40px);
  }
  100% {
    opacity: 1;
    transform: translateY(0);
  }
}

.socialmedia {
  position: fixed;
  bottom: 20px;
  left: 20px;
}

.socialmedia img {
  transition: 0.3s ease;
  margin-right: 12px;
}

.socialmedia img:hover {
  transform: scale(1.3);
}

#topBtn {
  position: fixed;
  bottom: 70px;
  right: 30px;
  padding: 12px 16px;
  font-size: 18px;
  border: none;
  border-radius: 50%;
  background: #0072ff;
  color: white;
  cursor: pointer;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  display: block;
  transition: 0.3s;
  z-index: 1000;
}

#topBtn:hover {
  background: #00c6ff;
  transform: scale(1.1);
}

@media screen and (max-width: 768px) {
  body {
    padding: 20px;
  }

  h1 {
    font-size: 24px;
  }

  form {
    width: 90%;
    padding: 20px;
  }

  input, textarea {
    font-size: 13px;
  }

  button {
    padding: 8px 16px;
    font-size: 14px;
  }

  .socialmedia img {
    height: 36px;
    width: 36px;
    margin-right: 8px;
  }

  a#header {
    display: block;
    margin: 8px auto;
    width: 90%;
  }

  #topBtn {
    padding: 10px 14px;
    font-size: 16px;
    bottom: 60px;
    right: 20px;
  }
}
</style>
