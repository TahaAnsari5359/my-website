<html>
<head>
<title> Contact Me </title>

<style>

body{
margin:0;
padding:40px 50px 0 50px;
font-family:Arial, sans-serif;
background:linear-gradient(135deg,#141e30,#243b55);
color:white;
}

hr{
border:none;
height:2px;
background:#4da6ff;
opacity:0.6;
}

a#header{
color:white;
text-decoration:none;
font-weight:700;
letter-spacing:1px;
padding:8px 18px;
border-radius:6px;
transition:0.3s;
}

a#header:hover{
background:#0072ff;
color:black;
box-shadow:0 6px 12px rgba(0,114,255,0.7);
transform:scale(1.08);
}

body > a{
margin-top:20px;
}

body > a#header{
font-size:18px;
margin:0 12px;
display:inline-block;
}

body > a#header:first-child{
margin-left:50px;
}

body > a#header:last-child{
margin-right:50px;
}

h1{
margin-top:40px;
font-size:34px;
font-family:Algerian, serif;
text-decoration:underline;
background:linear-gradient(90deg,#00ffff,#bb86fc,#00ff88,#ff9800);
background-size:600%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:gradientMove 6s linear infinite;
}

@keyframes gradientMove{
0%{background-position:0%;}
100%{background-position:300%;}
}

form{
background:linear-gradient(135deg,#1f2a40,#2c3e60);
padding:30px;
width:350px;
border-radius:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.6);
border:1px solid rgba(255,255,255,0.1);
transition:transform 0.4s ease,box-shadow 0.4s ease;
}

form:hover{
transform:scale(1.05);
box-shadow:0 20px 40px rgba(0,0,0,0.7);
background:linear-gradient(135deg,#2c3e60,#1f2a40);
}

input, textarea{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #444;
background:#101820;
color:white;
font-size:14px;
font-weight:700;
}

input:hover,textarea:hover{
background:#d9e2f1;
color:black;
}

input:focus, textarea:focus{
outline:none;
border-color:#0072ff;
box-shadow:0 0 8px #0072ff;
}

textarea{
height:100px;
resize:none;
}

button{
background:linear-gradient(135deg,#0072ff,#00c6ff);
color:white;
padding:10px 20px;
border:none;
border-radius:20px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 5px 15px rgba(0,114,255,0.6);
background:linear-gradient(135deg,#00c6ff,#0072ff);
}

h1{
animation:fadeSlideDown 1s ease forwards;
}

form{
animation:fadeSlideDown 1.2s ease forwards;
}

@keyframes fadeSlideDown{
0%{
opacity:0;
transform:translateY(-40px);
}
100%{
opacity:1;
transform:translateY(0);
}
}

</style>

</head>

</html>
