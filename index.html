<!doctype html>
<html>
<head>
<link rel="icon" type="image/png" href="favicon.png">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<meta name="description" content="Portfolio of Taha, a web developer specializing in JavaScript and modern web applications.">

<title>Taha's Portfolio</title>

<style>

html{
 scroll-behavior:smooth;
}

body{
margin:0;
font-family:'Segoe UI', sans-serif;
background-image:url("bg_image.png");
background-size:cover;
background-position:center;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

/* NAVBAR */
.navbar{
width:100%;
padding:15px 0;
background:linear-gradient(90deg,#141e30,#243b55);
display:flex;
justify-content:center;
gap:30px;
position:sticky;
top:0;
z-index:1000;
}

.navbar a{
color:white;
text-decoration:none;
padding:8px 15px;
border-radius:6px;
transition:0.3s;
}

.navbar a:hover{
background:#0072ff;
}

/* CONTENT */
#content{
background:white;
padding:30px;
border-radius:15px;
max-width:800px;
margin:30px auto;
}

h1{
text-align:center;
color:white;
}

/* CLOCK */
.clock {
position: fixed;
top: 100px;
right: 20px;
color: white;
font-size: 20px;
}

/* TOP BUTTON */
#topBtn{
position:fixed;
bottom:70px;
right:30px;
padding:12px;
border:none;
border-radius:50%;
background:#0072ff;
color:white;
cursor:pointer;
}

/* ✅ FLOATING BUTTONS */
.floating-buttons{
  position: fixed;
  bottom: 130px;
  right: 30px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  z-index: 1000;
}

.float-btn{
  width: 50px;
  height: 50px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: white;
  text-decoration: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.resume{
  background: #28a745;
}

.contact{
  background: #ff9800;
}

.float-btn:hover{
  transform: scale(1.15);
}

/* FOOTER */
.footer{
text-align:center;
color:white;
padding:15px;
background:#141e30;
margin-top:40px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Skills</a>
<a href="#">Projects</a>
</div>

<!-- CLOCK -->
<div id="clock" class="clock"></div>

<h1>Taha Portfolio</h1>

<div id="content">
<p>Hello! I am learning web development.</p>
<p>This is my portfolio website.</p>
</div>

<!-- TOP BUTTON -->
<button id="topBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆</button>

<!-- ✅ FLOATING BUTTONS -->
<div class="floating-buttons">
  <a href="tahacvanther.pdf" target="_blank" class="float-btn resume">
    <i class="fa-solid fa-file"></i>
  </a>

  <a href="contacts.html" class="float-btn contact">
    <i class="fa-solid fa-envelope"></i>
  </a>
</div>

<!-- FOOTER -->
<div class="footer">
© 2026 Taha Portfolio
</div>

<script>
function updateTime(){
const now = new Date();
document.getElementById("clock").innerText = now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();
</script>

</body>
</html>
