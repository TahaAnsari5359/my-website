<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Skills</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#141e30,#243b55);
min-height:100vh;
}

.navbar{
display:flex;
justify-content:center;
gap:35px;
padding:18px;
background:linear-gradient(90deg,#000428,#004e92);
box-shadow:0 5px 15px rgba(0,0,0,0.4);
position:sticky;
top:0;
}

.navbar a{
color:white;
text-decoration:none;
font-weight:600;
letter-spacing:1px;
padding:8px 18px;
border-radius:6px;
transition:0.3s;
}

.navbar a:hover{
background:#00c6ff;
color:black;
transform:scale(1.08);
}

.main{
width:85%;
max-width:700px;
margin:80px auto;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.3);
transition:0.3s;
}

.main:hover{
transform:scale(1.03);
}

h2{
text-align:center;
margin-bottom:40px;
font-size:32px;
background:linear-gradient(90deg,#00ffff,#bb86fc,#00ff88,#ff9800);
background-size:600%;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:gradientMove 6s linear infinite;
  text-decoration:underline;
  font-weight:900;
}

@keyframes gradientMove{
0%{background-position:0%;}
100%{background-position:300%;}
}

.skill{
margin-bottom:30px;
}

.skill-name{
margin-bottom:8px;
font-weight:600;
}

.skill-name:hover{
font-weight:900;
text-decoration:underline;
}

.progress{
width:100%;
background:#e0e0e0;
height:26px;
border-radius:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
text-align:center;
line-height:26px;
color:white;
font-weight:bold;
border-radius:20px;
animation:load 2s ease forwards;
}

.python{
width:90%;
background:linear-gradient(90deg,#28a745,#5dd879);
}

.cpp{
width:50%;
background:linear-gradient(90deg,#dc3545,#ff6b81);
}

.html{
width:70%;
background:linear-gradient(90deg,#e44d26,#f16529);
}

.css{
width:60%;
background:linear-gradient(90deg,#264de4,#3796ff);
}

@keyframes load{
from{width:0;}
}

hr{
border:none;
height:2px;
background:#4da6ff;
opacity:0.6;
margin-top:0;
}

</style>
</head>

<div class="progress-bar python">90%</div>
</div>
</div>

<div class="skill">
<div class="skill-name">C++</div>
<div class="progress">
<div class="progress-bar cpp">50%</div>
</div>
</div>

<div class="skill">

</div>
</div>

<div class="skill">

</div>
</div>

</div>
